services:
  - type: web
    name: terranova
    env: docker
    region: oregon
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://terranova.onrender.com
      - key: LOG_CHANNEL
        value: stderr
